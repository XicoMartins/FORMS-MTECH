{% extends 'core/base.html' %}

{% block title %}Registro de Produção{% endblock %}

{% block content %}
<h1>Registro de Produção</h1>

<form method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}

    {% for field in form %}
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {{ field.errors }}
    {% endfor %}

    <button type="submit">Salvar</button>
</form>
{% endblock %}
